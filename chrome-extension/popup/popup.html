<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Project Context Manager</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <!-- Login screen — shown when no JWT token is stored, hidden after login -->
  <div id="login-screen">
    <div class="login-card">
      <h2 class="login-title">Project <span>Context</span> Manager</h2>
      <div id="login-error" class="login-error hidden"></div>
      <div class="login-form">
        <input type="email"    id="login-email"    placeholder="Email address" autocomplete="email" />
        <input type="password" id="login-password" placeholder="Password"      autocomplete="current-password" />
        <button id="login-btn" class="btn-primary full-width">Log In</button>
      </div>
      <p class="login-hint">
        No account? Register at<br>
        <code>web-production-b9ae2.up.railway.app/app</code>
      </p>
    </div>
  </div>

  <!-- Main UI — hidden until the user logs in -->
  <div id="main-ui" class="hidden">

    <!-- Current tab bar: shows the active page URL and a ✓ badge if it's saved -->
    <div class="tab-bar">
      <span id="current-tab-url" class="tab-url">Loading…</span>
      <span id="current-tab-badge" class="tab-badge hidden">✓ Saved</span>
    </div>

    <!-- Quick-add: pick a list then click Add Tab -->
    <div class="section">
      <select id="list-select">
        <option value="">— select a list —</option>
      </select>
      <button id="add-btn" class="btn-primary">Add Tab</button>
    </div>

    <!-- Toolbar: create list + snapshot -->
    <div class="section" style="padding-top:0.35rem;padding-bottom:0.35rem;">
      <button id="new-list-btn"  class="btn-secondary" style="flex:1">+ New List</button>
      <button id="snapshot-btn"  class="btn-secondary" style="flex:1">⊞ Snapshot Tabs</button>
    </div>

    <!-- New list form — hidden until + New List is clicked -->
    <div id="new-list-form" class="section hidden">
      <input type="text" id="new-list-name" placeholder="List name…" />
      <button id="create-list-btn" class="btn-primary">Create</button>
      <button id="cancel-new-list-btn" class="btn-icon" title="Cancel">✕</button>
    </div>

    <!-- Toast notification -->
    <div id="status-toast" class="status-toast hidden" role="status"></div>

    <!-- List cards rendered by popup.js -->
    <div id="lists-container" class="lists-container"></div>

    <!-- Footer: logged-in email + logout -->
    <div class="footer">
      <span id="user-email-label" class="footer-email"></span>
      <button id="logout-btn" class="btn-link btn-link--dim" title="Log out">↩ Log out</button>
    </div>

  </div><!-- /#main-ui -->

  <script src="popup.js"></script>
</body>
</html>
