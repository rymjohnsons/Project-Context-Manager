<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Generate Extension Icons</title>
  <style>
    body { font-family: sans-serif; padding: 2rem; background: #0f172a; color: #e2e8f0; }
    button { background: #6366f1; color: white; border: none; padding: 0.75rem 1.5rem;
             border-radius: 6px; font-size: 1rem; cursor: pointer; margin-top: 1rem; }
    button:hover { background: #4f46e5; }
    #status { margin-top: 1rem; color: #94a3b8; }
    #previews { display: flex; gap: 1rem; align-items: flex-end; margin-top: 1.5rem; }
    #previews canvas { border: 1px solid #334155; border-radius: 4px; }
  </style>
</head>
<body>
  <h2>Icon Generator — Project Context Manager</h2>
  <p style="color:#94a3b8; margin-top:0.5rem;">
    Click the button below. Your browser will download three PNG files
    (icon16.png, icon48.png, icon128.png). Move them into the
    <code style="color:#93c5fd">chrome-extension/icons/</code> folder,
    then load the extension in Chrome.
  </p>

  <div id="previews"></div>
  <button onclick="generateAll()">Generate &amp; Download Icons</button>
  <p id="status"></p>

  <script>
    // Draw a single icon at the given pixel size onto a <canvas> element.
    function drawIcon(size) {
      const canvas = document.createElement('canvas');
      canvas.width  = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');

      // Rounded rectangle background in indigo (#6366f1)
      const r = size * 0.18;
      ctx.fillStyle = '#6366f1';
      ctx.beginPath();
      ctx.moveTo(r, 0);
      ctx.lineTo(size - r, 0);
      ctx.arcTo(size, 0,    size,      r,        r);
      ctx.lineTo(size, size - r);
      ctx.arcTo(size, size, size - r,  size,     r);
      ctx.lineTo(r, size);
      ctx.arcTo(0,    size, 0,         size - r, r);
      ctx.lineTo(0, r);
      ctx.arcTo(0,    0,    r,         0,        r);
      ctx.closePath();
      ctx.fill();

      // White "P" centered
      ctx.fillStyle    = 'white';
      ctx.font         = `bold ${Math.round(size * 0.58)}px sans-serif`;
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('P', size / 2, size / 2 + size * 0.03);

      return canvas;
    }

    // Trigger a PNG download for one canvas.
    function downloadCanvas(canvas, filename) {
      return new Promise(resolve => {
        canvas.toBlob(blob => {
          const a = document.createElement('a');
          a.href     = URL.createObjectURL(blob);
          a.download = filename;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          setTimeout(() => { URL.revokeObjectURL(a.href); resolve(); }, 400);
        }, 'image/png');
      });
    }

    // Show previews immediately on load so the user can see what they'll get.
    window.addEventListener('load', () => {
      const container = document.getElementById('previews');
      for (const size of [16, 48, 128]) {
        const canvas = drawIcon(size);
        const label  = document.createElement('div');
        label.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:0.4rem;';
        label.innerHTML = `<span style="color:#64748b;font-size:11px">icon${size}.png</span>`;
        label.prepend(canvas);
        container.appendChild(label);
      }
    });

    async function generateAll() {
      const status = document.getElementById('status');
      status.textContent = 'Generating…';
      for (const size of [16, 48, 128]) {
        const canvas = drawIcon(size);
        await downloadCanvas(canvas, `icon${size}.png`);
        status.textContent = `Downloaded icon${size}.png…`;
      }
      status.textContent =
        'Done! Move the 3 PNG files into chrome-extension/icons/, then load the extension.';
    }
  </script>
</body>
</html>
